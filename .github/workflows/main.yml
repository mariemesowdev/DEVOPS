name: CI - StudentAPI Spring Boot

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  build:
    name:  Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name:  Setup JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name:  Build
        run: mvn clean compile
        working-directory: tp3-devops/studentapi

  package:
    name:  Package
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v3

      - name:  Setup JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name:  Package
        run: mvn clean package -DskipTests
        working-directory: tp3-devops/studentapi

      - name:  Upload JAR
        uses: actions/upload-artifact@v3
        with:
          name: studentapi-jar
          path: tp3-devops/studentapi/target/*.jar
