stages:
  - build
  - test
  - package

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"

cache:
  paths:
    - .m2/repository

build:
  stage: build
  image: maven:3.9.6-eclipse-temurin-17
  tags:
    - gitlab-org-medium
  script:
    - echo " Build du projet..."
    - mvn clean compile
  artifacts:
    paths:
      - target/

test:
  stage: test
  image: maven:3.9.6-eclipse-temurin-17
  tags:
    - gitlab-org-medium
  script:
    - echo " Lancement des tests..."
    - mvn test
  allow_failure: true

package:
  stage: package
  image: maven:3.9.6-eclipse-temurin-17
  tags:
    - gitlab-org-medium
  script:
    - echo " Packaging de l'application..."
    - mvn clean package -DskipTests
  artifacts:
    paths:
      - target/*.jar
    expire_in: 1 week